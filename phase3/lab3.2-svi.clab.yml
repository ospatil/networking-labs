# Lab 3.2 — Layer 3 Switch (Switched Virtual Interfaces / SVIs)
#
# Instead of a separate router, the switch itself does the routing
# by assigning IPs directly to the bridge (SVI = bridge VLAN interface).
# This is how a real L3 switch works, and how AWS VPC subnet routing works.
#
# Compare with Lab 3.1 (router-on-a-stick):
#   3.1: traffic leaves switch → goes to router → comes back
#   3.2: routing happens INSIDE the switch — one fewer hop
#
# Deploy: sudo containerlab deploy -t lab3.2-svi.clab.yml

name: lab3-2-svi

topology:
  nodes:
    # This single node acts as BOTH switch and router (L3 switch)
    l3switch:
      kind: linux
      image: frrouting/frr:latest
      exec:
        # Create a VLAN-aware bridge
        - ip link add name br0 type bridge vlan_filtering 1
        - ip link set br0 up

        # Add access ports for hosts
        - ip link set eth1 master br0
        - ip link set eth2 master br0
        - ip link set eth3 master br0
        - ip link set eth4 master br0

        # Access port assignments
        - bridge vlan add vid 10 dev eth1 pvid untagged
        - bridge vlan del vid 1  dev eth1
        - bridge vlan add vid 10 dev eth2 pvid untagged
        - bridge vlan del vid 1  dev eth2
        - bridge vlan add vid 20 dev eth3 pvid untagged
        - bridge vlan del vid 1  dev eth3
        - bridge vlan add vid 20 dev eth4 pvid untagged
        - bridge vlan del vid 1  dev eth4

        # ── SVIs: VLAN interfaces on the bridge itself ──
        # These are the "Switched Virtual Interfaces" — the bridge gets
        # an IP per VLAN, which becomes the default gateway for that VLAN.
        - ip link add link br0 name br0.10 type vlan id 10
        - ip link add link br0 name br0.20 type vlan id 20
        - ip link set br0.10 up
        - ip link set br0.20 up
        - ip addr add 10.10.0.254/24 dev br0.10   # SVI for VLAN 10
        - ip addr add 10.20.0.254/24 dev br0.20   # SVI for VLAN 20

        # Enable IP forwarding (makes it route between SVIs)
        - sysctl -w net.ipv4.ip_forward=1

        # Allow the bridge to pass traffic to the SVI (needed on Linux)
        - bridge vlan add vid 10 dev br0 self
        - bridge vlan add vid 20 dev br0 self

    # VLAN 10 hosts
    host-v10-a:
      kind: linux
      image: ghcr.io/hellt/network-multitool
      exec:
        - ip addr add 10.10.0.1/24 dev eth1
        - ip link set eth1 up
        - ip route add default via 10.10.0.254

    host-v10-b:
      kind: linux
      image: ghcr.io/hellt/network-multitool
      exec:
        - ip addr add 10.10.0.2/24 dev eth1
        - ip link set eth1 up
        - ip route add default via 10.10.0.254

    # VLAN 20 hosts
    host-v20-a:
      kind: linux
      image: ghcr.io/hellt/network-multitool
      exec:
        - ip addr add 10.20.0.1/24 dev eth1
        - ip link set eth1 up
        - ip route add default via 10.20.0.254

    host-v20-b:
      kind: linux
      image: ghcr.io/hellt/network-multitool
      exec:
        - ip addr add 10.20.0.2/24 dev eth1
        - ip link set eth1 up
        - ip route add default via 10.20.0.254

  links:
    - endpoints: ["host-v10-a:eth1", "l3switch:eth1"]
    - endpoints: ["host-v10-b:eth1", "l3switch:eth2"]
    - endpoints: ["host-v20-a:eth1", "l3switch:eth3"]
    - endpoints: ["host-v20-b:eth1", "l3switch:eth4"]

# -------------------------------------------------------------
# EXERCISES
# -------------------------------------------------------------
# 1. Intra-VLAN ping (L2 switching, never leaves the bridge):
#      docker exec clab-lab3-2-svi-host-v10-a ping 10.10.0.2
#
# 2. Inter-VLAN ping (routed via SVI — no external router needed!):
#      docker exec clab-lab3-2-svi-host-v10-a ping 10.20.0.1
#
# 3. Traceroute inter-VLAN — notice only ONE hop (the SVI itself):
#      docker exec clab-lab3-2-svi-host-v10-a traceroute 10.20.0.1
#    Compare to Lab 3.1 where traceroute showed 2 hops (switch + router).
#
# 4. View SVIs on the l3switch:
#      docker exec clab-lab3-2-svi-l3switch ip addr show
#    You'll see br0.10 and br0.20 with their gateway IPs.
#
# 5. View the routing table on the l3switch (connected routes only):
#      docker exec clab-lab3-2-svi-l3switch ip route show
#
# 6. Key AWS insight: This is exactly how VPC subnet routing works.
#    Each subnet has an implicit router (the VPC router) acting as an SVI.
#    Instances set their default gateway to the .1 or .254 of their subnet —
#    that's the AWS VPC SVI equivalent.
