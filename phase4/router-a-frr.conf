! FRR Configuration — router-a (AS 65001, on-premises)
! File: router-a-frr.conf
!
frr version 9.0
frr defaults traditional
hostname router-a
log syslog informational
no ipv6 forwarding
!
interface eth1
 description Link to router-b (AS 65002)
!
router bgp 65001
 bgp router-id 10.0.0.1
 !
 ! Define the eBGP neighbor (router-b)
 neighbor 10.0.0.2 remote-as 65002
 neighbor 10.0.0.2 description AWS-side router
 !
 address-family ipv4 unicast
  ! Advertise our on-prem network to AWS
  network 192.168.1.0/24
  !
  ! Don't send our routes back to us (standard eBGP)
  neighbor 10.0.0.2 activate
  neighbor 10.0.0.2 soft-reconfiguration inbound
 exit-address-family
!
line vty
!
