! ============================================================
! router-c.conf — AS 65003 (receives two paths to 192.168.1.0/24)
! Direct path via router-a AND indirect via router-b
! ============================================================
frr version 9.0
frr defaults traditional
hostname router-c
log syslog informational
no ipv6 forwarding
!
router bgp 65003
 bgp router-id 10.0.13.2
 neighbor 10.0.13.1 remote-as 65001
 neighbor 10.0.13.1 description router-a-AS65001-direct
 neighbor 10.0.23.1 remote-as 65002
 neighbor 10.0.23.1 description router-b-AS65002-transit
 !
 address-family ipv4 unicast
  network 172.16.3.0/24
  neighbor 10.0.13.1 activate
  neighbor 10.0.13.1 soft-reconfiguration inbound
  neighbor 10.0.13.1 next-hop-self
  neighbor 10.0.23.1 activate
  neighbor 10.0.23.1 soft-reconfiguration inbound
  neighbor 10.0.23.1 next-hop-self
 exit-address-family
!
line vty
