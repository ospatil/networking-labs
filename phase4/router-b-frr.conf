! FRR Configuration — router-b (AS 65002, AWS-side)
! File: router-b-frr.conf
!
frr version 9.0
frr defaults traditional
hostname router-b
log syslog informational
no ipv6 forwarding
!
interface eth1
 description Link to router-a (AS 65001)
!
router bgp 65002
 bgp router-id 10.0.0.2
 !
 ! Define the eBGP neighbor (router-a)
 neighbor 10.0.0.1 remote-as 65001
 neighbor 10.0.0.1 description On-premises router
 !
 address-family ipv4 unicast
  ! Advertise our VPC CIDR to on-premises
  network 172.16.0.0/24
  !
  neighbor 10.0.0.1 activate
  neighbor 10.0.0.1 soft-reconfiguration inbound
 exit-address-family
!
line vty
!
