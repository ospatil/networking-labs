! ============================================================
! rr1.conf — Route Reflector, AS 65000
! All 4 clients (r1-r4) are in the same RR cluster.
! ============================================================
frr version 9.0
frr defaults traditional
hostname rr1
log syslog informational
no ipv6 forwarding
!
router bgp 65000
 bgp router-id 10.255.0.1
 bgp cluster-id 10.255.0.1
 !
 ! All peers are in the same AS = iBGP
 neighbor 10.0.0.2  remote-as 65000
 neighbor 10.0.0.2  description r1-client
 neighbor 10.0.0.6  remote-as 65000
 neighbor 10.0.0.6  description r2-client
 neighbor 10.0.0.10 remote-as 65000
 neighbor 10.0.0.10 description r3-client
 neighbor 10.0.0.14 remote-as 65000
 neighbor 10.0.0.14 description r4-client
 !
 address-family ipv4 unicast
  ! route-reflector-client enables reflection for each peer
  neighbor 10.0.0.2  activate
  neighbor 10.0.0.2  route-reflector-client
  neighbor 10.0.0.2  soft-reconfiguration inbound
  neighbor 10.0.0.6  activate
  neighbor 10.0.0.6  route-reflector-client
  neighbor 10.0.0.6  soft-reconfiguration inbound
  neighbor 10.0.0.10 activate
  neighbor 10.0.0.10 route-reflector-client
  neighbor 10.0.0.10 soft-reconfiguration inbound
  neighbor 10.0.0.14 activate
  neighbor 10.0.0.14 route-reflector-client
  neighbor 10.0.0.14 soft-reconfiguration inbound
 exit-address-family
!
line vty
