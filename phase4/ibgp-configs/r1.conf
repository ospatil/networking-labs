! r1.conf — iBGP client, AS 65000, peers only with rr1
frr version 9.0
frr defaults traditional
hostname r1
log syslog informational
no ipv6 forwarding
!
router bgp 65000
 bgp router-id 10.255.0.11
 neighbor 10.0.0.1 remote-as 65000
 neighbor 10.0.0.1 description rr1-route-reflector
 neighbor 10.0.0.1 update-source eth1
 !
 address-family ipv4 unicast
  network 192.168.11.0/24
  neighbor 10.0.0.1 activate
  neighbor 10.0.0.1 soft-reconfiguration inbound
  ! NOTE: next-hop-self not set here — this is the iBGP next-hop issue.
  ! Routes reflected by rr1 will have next-hop = the ORIGINATING router,
  ! NOT rr1. This means r1 needs a route to r2/r3/r4's IPs to use
  ! those routes (hence why IGP is needed in real networks alongside iBGP).
 exit-address-family
!
line vty
