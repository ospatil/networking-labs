! r3.conf — iBGP client, AS 65000, peers only with rr1
frr version 9.0
frr defaults traditional
hostname r3
log syslog informational
no ipv6 forwarding
!
router bgp 65000
 bgp router-id 10.255.0.13
 neighbor 10.0.0.9 remote-as 65000
 neighbor 10.0.0.9 description rr1-route-reflector
 neighbor 10.0.0.9 update-source eth1
 !
 address-family ipv4 unicast
  network 192.168.13.0/24
  neighbor 10.0.0.9 activate
  neighbor 10.0.0.9 soft-reconfiguration inbound
 exit-address-family
!
line vty
