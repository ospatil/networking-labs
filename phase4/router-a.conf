! ============================================================
! router-a.conf — AS 65001 (origin of 192.168.1.0/24)
! Peers with router-b (65002) and router-c (65003)
! ============================================================
frr version 9.0
frr defaults traditional
hostname router-a
log syslog informational
no ipv6 forwarding
!
router bgp 65001
 bgp router-id 10.0.12.1
 neighbor 10.0.12.2 remote-as 65002
 neighbor 10.0.12.2 description router-b-AS65002
 neighbor 10.0.13.2 remote-as 65003
 neighbor 10.0.13.2 description router-c-AS65003
 !
 address-family ipv4 unicast
  network 192.168.1.0/24
  neighbor 10.0.12.2 activate
  neighbor 10.0.12.2 soft-reconfiguration inbound
  neighbor 10.0.12.2 next-hop-self
  neighbor 10.0.13.2 activate
  neighbor 10.0.13.2 soft-reconfiguration inbound
  neighbor 10.0.13.2 next-hop-self
 exit-address-family
!
line vty
