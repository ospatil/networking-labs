! ============================================================
! router-b.conf — AS 65002 (transit AS between A and C)
! ============================================================
frr version 9.0
frr defaults traditional
hostname router-b
log syslog informational
no ipv6 forwarding
!
router bgp 65002
 bgp router-id 10.0.12.2
 neighbor 10.0.12.1 remote-as 65001
 neighbor 10.0.12.1 description router-a-AS65001
 neighbor 10.0.23.2 remote-as 65003
 neighbor 10.0.23.2 description router-c-AS65003
 !
 address-family ipv4 unicast
  neighbor 10.0.12.1 activate
  neighbor 10.0.12.1 soft-reconfiguration inbound
  neighbor 10.0.12.1 next-hop-self
  neighbor 10.0.23.2 activate
  neighbor 10.0.23.2 soft-reconfiguration inbound
  neighbor 10.0.23.2 next-hop-self
 exit-address-family
!
line vty
