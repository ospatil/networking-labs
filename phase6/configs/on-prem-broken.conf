frr version 9.0
frr defaults traditional
hostname on-prem-router
no ipv6 forwarding
!
router bgp 65001
 bgp router-id 169.254.100.1
 ! FAULT 1: wrong remote-as (should be 64512)
 neighbor 169.254.100.2 remote-as 99999
 neighbor 169.254.100.2 description AWS-edge
 !
 address-family ipv4 unicast
  network 10.100.0.0/24
  neighbor 169.254.100.2 activate
  neighbor 169.254.100.2 soft-reconfiguration inbound
  neighbor 169.254.100.2 next-hop-self
 exit-address-family
!
line vty
