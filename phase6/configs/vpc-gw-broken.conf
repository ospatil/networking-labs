frr version 9.0
frr defaults traditional
hostname vpc-gw
no ipv6 forwarding
!
router bgp 64512
 bgp router-id 10.200.0.2
 neighbor 10.200.0.1 remote-as 64512
 neighbor 10.200.0.1 description aws-edge
 neighbor 10.200.0.1 update-source eth1
 !
 address-family ipv4 unicast
  ! FAULT 3: prefix /24 doesn't exist in RIB (loopback has /16, not /24)
  network 10.0.0.0/24
  neighbor 10.200.0.1 activate
  neighbor 10.200.0.1 soft-reconfiguration inbound
 exit-address-family
!
line vty
