! ============================================================
! on-prem-ecmp.conf — ECMP: two equal-cost paths to VPC
! ============================================================
frr version 9.0
frr defaults traditional
hostname on-prem-router
no ipv6 forwarding
!
router bgp 65001
 bgp router-id 169.254.10.1
 neighbor 169.254.10.2 remote-as 64512
 neighbor 169.254.10.2 description AWS-Edge-1-Path-A
 neighbor 169.254.20.2 remote-as 64512
 neighbor 169.254.20.2 description AWS-Edge-2-Path-B
 !
 address-family ipv4 unicast
  network 10.100.0.0/24
  ! CRITICAL: enable BGP multipath to install both equal-cost routes
  maximum-paths 2
  neighbor 169.254.10.2 activate
  neighbor 169.254.10.2 soft-reconfiguration inbound
  neighbor 169.254.10.2 next-hop-self
  neighbor 169.254.20.2 activate
  neighbor 169.254.20.2 soft-reconfiguration inbound
  neighbor 169.254.20.2 next-hop-self
 exit-address-family
!
line vty

! ============================================================
! aws-edge-1-ecmp.conf
! ============================================================
frr version 9.0
frr defaults traditional
hostname aws-edge-1
no ipv6 forwarding
!
router bgp 64512
 bgp router-id 169.254.10.2
 neighbor 169.254.10.1 remote-as 65001
 neighbor 169.254.10.1 description Customer-Path-A
 neighbor 10.200.0.2 remote-as 64512
 neighbor 10.200.0.2 description VPC-GW-iBGP
 neighbor 10.200.0.2 update-source eth2
 !
 address-family ipv4 unicast
  neighbor 169.254.10.1 activate
  neighbor 169.254.10.1 soft-reconfiguration inbound
  neighbor 10.200.0.2 activate
  neighbor 10.200.0.2 next-hop-self
  neighbor 10.200.0.2 soft-reconfiguration inbound
 exit-address-family
!
line vty

