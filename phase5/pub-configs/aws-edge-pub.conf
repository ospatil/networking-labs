! ============================================================
! aws-edge-pub.conf — AWS edge with private + public VIF
! ============================================================
frr version 9.0
frr defaults traditional
hostname aws-edge
log syslog informational
no ipv6 forwarding
!
router bgp 64512
 bgp router-id 169.254.100.2
 !
 ! Private VIF (eBGP to customer)
 neighbor 169.254.100.1 remote-as 65001
 neighbor 169.254.100.1 description Customer-Private-VIF
 !
 ! Public VIF (eBGP to customer)
 neighbor 169.254.200.1 remote-as 65001
 neighbor 169.254.200.1 description Customer-Public-VIF
 !
 ! iBGP to VGW (for private path)
 neighbor 10.200.0.2 remote-as 64512
 neighbor 10.200.0.2 description VGW-iBGP
 neighbor 10.200.0.2 update-source eth2
 !
 ! iBGP to public services router
 neighbor 10.200.1.2 remote-as 64512
 neighbor 10.200.1.2 description PublicSvc-iBGP
 neighbor 10.200.1.2 update-source eth3
 !
 address-family ipv4 unicast
  neighbor 169.254.100.1 activate
  neighbor 169.254.100.1 soft-reconfiguration inbound
  neighbor 169.254.200.1 activate
  neighbor 169.254.200.1 soft-reconfiguration inbound
  neighbor 10.200.0.2 activate
  neighbor 10.200.0.2 next-hop-self
  neighbor 10.200.0.2 soft-reconfiguration inbound
  neighbor 10.200.1.2 activate
  neighbor 10.200.1.2 next-hop-self
  neighbor 10.200.1.2 soft-reconfiguration inbound
 exit-address-family
!
line vty

! ============================================================
! aws-public-svc.conf — Simulated AWS public service endpoints
! ============================================================
frr version 9.0
frr defaults traditional
hostname aws-public-svc
log syslog informational
no ipv6 forwarding
!
router bgp 64512
 bgp router-id 10.200.1.2
 !
 neighbor 10.200.1.1 remote-as 64512
 neighbor 10.200.1.1 description AWS-Edge-iBGP
 neighbor 10.200.1.1 update-source eth1
 !
 address-family ipv4 unicast
  ! Advertise simulated AWS public service prefixes
  network 52.92.0.0/20
  network 52.94.0.0/22
  neighbor 10.200.1.1 activate
  neighbor 10.200.1.1 soft-reconfiguration inbound
 exit-address-family
!
line vty
