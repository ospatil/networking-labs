! ============================================================
! on-prem-pub.conf — Customer router: private + public VIF
! ============================================================
frr version 9.0
frr defaults traditional
hostname on-prem-router
log syslog informational
no ipv6 forwarding
!
! Prefix lists for public VIF security
ip prefix-list PRIVATE-NET permit 10.0.0.0/8 le 32
ip prefix-list PRIVATE-NET permit 172.16.0.0/12 le 32
ip prefix-list PRIVATE-NET permit 192.168.0.0/16 le 32
ip prefix-list PRIVATE-NET permit 0.0.0.0/0
!
ip prefix-list PUBLIC-OUT permit 203.0.113.0/24
ip prefix-list PUBLIC-OUT deny any
!
! Block RFC1918 and default from being received on public VIF
ip prefix-list PUBLIC-IN deny 10.0.0.0/8 le 32
ip prefix-list PUBLIC-IN deny 172.16.0.0/12 le 32
ip prefix-list PUBLIC-IN deny 192.168.0.0/16 le 32
ip prefix-list PUBLIC-IN deny 0.0.0.0/0
ip prefix-list PUBLIC-IN permit any
!
router bgp 65001
 bgp router-id 169.254.100.1
 !
 ! Private VIF neighbor
 neighbor 169.254.100.2 remote-as 64512
 neighbor 169.254.100.2 description Private-VIF
 !
 ! Public VIF neighbor
 neighbor 169.254.200.2 remote-as 64512
 neighbor 169.254.200.2 description Public-VIF
 !
 address-family ipv4 unicast
  ! Private VIF — advertise on-prem RFC1918 prefix
  network 10.100.0.0/24
  neighbor 169.254.100.2 activate
  neighbor 169.254.100.2 soft-reconfiguration inbound
  neighbor 169.254.100.2 next-hop-self
  !
  ! Public VIF — advertise only our public prefix, filter inbound RFC1918
  network 203.0.113.0/24
  neighbor 169.254.200.2 activate
  neighbor 169.254.200.2 soft-reconfiguration inbound
  neighbor 169.254.200.2 prefix-list PUBLIC-OUT out
  neighbor 169.254.200.2 prefix-list PUBLIC-IN in
 exit-address-family
!
line vty
