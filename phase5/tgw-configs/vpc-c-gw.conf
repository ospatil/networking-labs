frr version 9.0
frr defaults traditional
hostname vpc-c-gw
no ipv6 forwarding
!
router bgp 64512
 bgp router-id 10.200.3.2
 neighbor 10.200.3.1 remote-as 64512
 neighbor 10.200.3.1 description TGW
 neighbor 10.200.3.1 update-source eth1
 address-family ipv4 unicast
  network 10.0.3.0/24
  neighbor 10.200.3.1 activate
  neighbor 10.200.3.1 soft-reconfiguration inbound
 exit-address-family
!
line vty
