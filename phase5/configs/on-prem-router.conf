! ============================================================
! on-prem-router.conf — Customer router for Private VIF
! AS 65001, peering over VLAN 100 link-local /30
! ============================================================
frr version 9.0
frr defaults traditional
hostname on-prem-router
log syslog informational
no ipv6 forwarding
!
router bgp 65001
 bgp router-id 169.254.100.1
 !
 ! AWS uses link-local BGP peering IPs (169.254.x.x) on DX
 neighbor 169.254.100.2 remote-as 64512
 neighbor 169.254.100.2 description AWS-Private-VIF
 !
 address-family ipv4 unicast
  ! Advertise on-prem network to VPC
  network 10.100.0.0/24
  !
  neighbor 169.254.100.2 activate
  neighbor 169.254.100.2 soft-reconfiguration inbound
  !
  ! AWS DX requirement: set next-hop-self for routes going to AWS
  neighbor 169.254.100.2 next-hop-self
 exit-address-family
!
line vty
