! ============================================================
! aws-edge-router.conf — AWS edge router (DX termination)
! AS 64512 (AWS reserved private ASN)
! ============================================================
frr version 9.0
frr defaults traditional
hostname aws-edge-router
log syslog informational
no ipv6 forwarding
!
router bgp 64512
 bgp router-id 169.254.100.2
 !
 ! eBGP peer: Customer on-prem router (Private VIF)
 neighbor 169.254.100.1 remote-as 65001
 neighbor 169.254.100.1 description Customer-Private-VIF
 !
 ! iBGP peer: Virtual Private Gateway (internal AWS)
 neighbor 10.200.0.2 remote-as 64512
 neighbor 10.200.0.2 description VPC-Gateway-iBGP
 neighbor 10.200.0.2 update-source eth2
 !
 address-family ipv4 unicast
  ! Receive on-prem routes from customer, propagate to VGW
  neighbor 169.254.100.1 activate
  neighbor 169.254.100.1 soft-reconfiguration inbound
  !
  ! iBGP to VGW
  neighbor 10.200.0.2 activate
  neighbor 10.200.0.2 next-hop-self
  neighbor 10.200.0.2 soft-reconfiguration inbound
 exit-address-family
!
line vty
