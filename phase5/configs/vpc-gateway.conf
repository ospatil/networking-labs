! ============================================================
! vpc-gateway.conf — Virtual Private Gateway (VGW)
! AS 64512 (same as AWS edge — iBGP)
! ============================================================
frr version 9.0
frr defaults traditional
hostname vpc-gateway
log syslog informational
no ipv6 forwarding
!
router bgp 64512
 bgp router-id 10.200.0.2
 !
 ! iBGP peer: AWS edge router
 neighbor 10.200.0.1 remote-as 64512
 neighbor 10.200.0.1 description AWS-Edge-iBGP
 neighbor 10.200.0.1 update-source eth1
 !
 address-family ipv4 unicast
  ! Advertise VPC CIDR — this propagates back to on-prem via AWS edge
  network 10.0.0.0/24
  !
  neighbor 10.200.0.1 activate
  neighbor 10.200.0.1 soft-reconfiguration inbound
 exit-address-family
!
line vty
