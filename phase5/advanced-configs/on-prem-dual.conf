! ============================================================
! on-prem-dual.conf — Customer router with 2 DX connections
! Primary: 169.254.100.2 (aws-edge-1)
! Backup:  169.254.200.2 (aws-edge-2) — AS-PATH prepended
! ============================================================
frr version 9.0
frr defaults traditional
hostname on-prem-router
log syslog informational
no ipv6 forwarding
!
! Route-map: prepend AS-PATH on backup path outbound
! This makes AWS prefer the primary path to reach on-prem
route-map BACKUP-OUT permit 10
 set as-path prepend 65001 65001 65001
!
route-map PRIMARY-OUT permit 10
 ! No manipulation — advertise normally
!
router bgp 65001
 bgp router-id 169.254.100.1
 !
 ! Primary DX connection (aws-edge-1)
 neighbor 169.254.100.2 remote-as 64512
 neighbor 169.254.100.2 description Primary-DX-Connection
 !
 ! Backup DX connection (aws-edge-2)
 neighbor 169.254.200.2 remote-as 64512
 neighbor 169.254.200.2 description Backup-DX-Connection
 !
 address-family ipv4 unicast
  network 10.100.0.0/22
  !
  ! Primary — advertise normally
  neighbor 169.254.100.2 activate
  neighbor 169.254.100.2 soft-reconfiguration inbound
  neighbor 169.254.100.2 route-map PRIMARY-OUT out
  neighbor 169.254.100.2 next-hop-self
  !
  ! Backup — prepend AS-PATH so AWS deprioritises this path
  neighbor 169.254.200.2 activate
  neighbor 169.254.200.2 soft-reconfiguration inbound
  neighbor 169.254.200.2 route-map BACKUP-OUT out
  neighbor 169.254.200.2 next-hop-self
 exit-address-family
!
line vty
