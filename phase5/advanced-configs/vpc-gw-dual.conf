! ============================================================
! vpc-gw-dual.conf — VGW with two iBGP peers (both AWS edges)
! ============================================================
frr version 9.0
frr defaults traditional
hostname vpc-gateway
log syslog informational
no ipv6 forwarding
!
router bgp 64512
 bgp router-id 10.200.0.2
 !
 ! iBGP to primary edge
 neighbor 10.200.0.1 remote-as 64512
 neighbor 10.200.0.1 description AWS-Edge-1-Primary
 neighbor 10.200.0.1 update-source eth1
 !
 ! iBGP to backup edge
 neighbor 10.200.0.5 remote-as 64512
 neighbor 10.200.0.5 description AWS-Edge-2-Backup
 neighbor 10.200.0.5 update-source eth2
 !
 address-family ipv4 unicast
  ! Advertise VPC CIDR to both edges (they propagate to on-prem)
  network 10.0.0.0/24
  !
  neighbor 10.200.0.1 activate
  neighbor 10.200.0.1 soft-reconfiguration inbound
  !
  neighbor 10.200.0.5 activate
  neighbor 10.200.0.5 soft-reconfiguration inbound
 exit-address-family
!
line vty
