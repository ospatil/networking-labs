! ============================================================
! aws-edge-2.conf — Backup AWS edge router
! ============================================================
frr version 9.0
frr defaults traditional
hostname aws-edge-2
log syslog informational
no ipv6 forwarding
!
router bgp 64512
 bgp router-id 169.254.200.2
 !
 neighbor 169.254.200.1 remote-as 65001
 neighbor 169.254.200.1 description Customer-Backup-DX
 !
 neighbor 10.200.0.6 remote-as 64512
 neighbor 10.200.0.6 description VPC-Gateway-iBGP
 neighbor 10.200.0.6 update-source eth2
 !
 address-family ipv4 unicast
  neighbor 169.254.200.1 activate
  neighbor 169.254.200.1 soft-reconfiguration inbound
  !
  neighbor 10.200.0.6 activate
  neighbor 10.200.0.6 next-hop-self
  neighbor 10.200.0.6 soft-reconfiguration inbound
 exit-address-family
!
line vty
